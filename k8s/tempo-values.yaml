# ================================================================
# Grafana Tempo - 모노리틱 모드 (단일 노드, 학습용)
# 역할: Alloy에서 전달된 OTLP 트레이스를 수신 · 저장 · 조회 제공
#
# 포트
#   3200 : HTTP API (Grafana 데이터소스 연결)
#   4317 : OTLP gRPC 수신 (Alloy → Tempo)
#   4318 : OTLP HTTP 수신
#
# 차트 deprecated 경고에 대해
#   grafana/tempo 차트는 공식 deprecated 처리되었고 후속은 grafana/tempo-distributed다.
#   그러나 tempo-distributed는 분산 컴포넌트 간 공유 스토리지(ReadWriteMany PVC 또는 S3)가 필요하다.
#   Minikube 기본 StorageClass(hostPath)는 ReadWriteOnce만 지원하므로 단일 노드에서 동작하지 않는다.
#   학습 환경에서는 grafana/tempo를 그대로 사용한다 (기능 자체는 정상 동작).
# ================================================================

tempo:
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m

  # OTLP 수신기 명시 설정
  # 이 설정이 없으면 차트가 Service에 4317 포트를 노출하지 않아
  # Alloy에서 tempo.monitoring.svc.cluster.local:4317 로 연결할 수 없다.
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

  # 로컬 파일시스템 스토리지 (학습 환경 — S3/GCS 불필요)
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # Metrics Generator — Service Graph / Span Metrics 생성
  # 비활성화 시 Grafana Service Graph 탭에서 "empty ring" 에러 발생
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://prometheus-operated.monitoring.svc.cluster.local:9090/api/v1/write"

# PVC 마운트 — /var/tempo 쓰기 권한 확보
# false 시 "read-only file system" 에러로 크래시됨 (Loki와 동일 이유)
persistence:
  enabled: true
  size: 5Gi
  storageClassName: standard   # Minikube 기본 StorageClass (hostPath)
