# ================================================================
# kube-prometheus-stack - Minikube 최소 설정
# 대상 환경: 단일 노드, 6GB RAM, 3 CPU
# ================================================================

# Alertmanager 비활성화 - 학습 환경에서 불필요 (~200MB RAM 절약)
alertmanager:
  enabled: false

# ----------------------------------------------------------------
# Grafana
# ----------------------------------------------------------------
grafana:
  enabled: true
  adminPassword: admin

  service:
    type: NodePort # Minikube에서 브라우저 접근 시 필요

  # 재시작 시 초기화되어도 무방한 학습 환경
  persistence:
    enabled: false

  # Drilldown 앱 플러그인
  # grafana-exploretraces-app : Traces Drilldown (트레이스 탐색)
  # grafana-lokiexplore-app   : Logs Drilldown (로그 탐색)
  # grafana-metricsdrilldown-app: Metrics Drilldown (메트릭 탐색)
  plugins:
    - grafana-exploretraces-app
    - grafana-lokiexplore-app
    - grafana-metricsdrilldown-app

  # 데이터소스 자동 등록 (Explore에서 바로 조회 가능)
  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

    - name: Tempo
      uid: tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3200
      access: proxy
      isDefault: false
      jsonData:
        # 트레이스 상세 → Node Graph 시각화
        nodeGraph:
          enabled: true
        # Tempo 트레이스에서 Loki 로그로 바로 이동 (TraceID 연동)
        tracesToLogsV2:
          datasourceUid: loki
        # Tempo 트레이스에서 Prometheus 메트릭으로 바로 이동
        tracesToMetrics:
          datasourceUid: prometheus
        # Service Graph — metrics generator가 Prometheus에 write한 데이터 조회
        serviceMap:
          datasourceUid: prometheus

# ----------------------------------------------------------------
# Prometheus
# ----------------------------------------------------------------
prometheus:
  prometheusSpec:
    retention: 24h # 디스크 사용량 최소화

    # Tempo metrics generator → Prometheus remote write 수신 허용
    enableRemoteWriteReceiver: true

    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m

    # 모든 네임스페이스의 ServiceMonitor / PodMonitor 수집
    # (NestJS 앱 배포 후 /metrics 스크레이프에 필요)
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# ----------------------------------------------------------------
# Prometheus Operator
# ----------------------------------------------------------------
prometheusOperator:
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

# ----------------------------------------------------------------
# kube-state-metrics: Pod / Deployment 상태 메트릭 수집
# ----------------------------------------------------------------
kube-state-metrics:
  resources:
    requests:
      memory: 64Mi
      cpu: 10m
    limits:
      memory: 128Mi
      cpu: 100m

# ----------------------------------------------------------------
# node-exporter
# Minikube 노드에 테인트가 있을 경우 DaemonSet이 스케줄되지 않아
# helm install --wait 가 timeout 된다.
# tolerations: Exists 로 모든 테인트를 허용한다.
# ----------------------------------------------------------------
prometheus-node-exporter:
  tolerations:
    - operator: Exists # 모든 테인트 허용 (Minikube control-plane 포함)
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 64Mi
      cpu: 50m

# ----------------------------------------------------------------
# Minikube 환경에서 접근 불가한 컨트롤 플레인 컴포넌트 비활성화
# (활성화 시 "connection refused" 스크레이프 에러 발생)
# ----------------------------------------------------------------
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false
